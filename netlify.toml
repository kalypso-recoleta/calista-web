# Déploiement Netlify — site statique Astro
[build]
  command = "npm run build"
  publish = "dist"

# Formulaire de contact détecté automatiquement par Netlify Forms
# (gratuit dans le free tier). Voir src/pages/contacto.astro.

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
